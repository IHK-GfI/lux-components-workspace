@if (showSessionTimer() && !isMobileView()) {
<lux-button
  luxTagId="lux-session-timer-button"
  luxColor="primary"
  luxIconName="lux-interface-time-reset"
  [luxLabel]="getTimerLabel()"
  (luxClicked)="extendTimer()"
  [luxAriaLabel]="getTimerLabel()"
  (focusin)="announceSessionTimer()"
  [luxLoading]="isLuxLoading()"
  [luxTooltip]="getTimerTooltip()"
  [luxTooltipShowDelay]="1000"
></lux-button>
}
