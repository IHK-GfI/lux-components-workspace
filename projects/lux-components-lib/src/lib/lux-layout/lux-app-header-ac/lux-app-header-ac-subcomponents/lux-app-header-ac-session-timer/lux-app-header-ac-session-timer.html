@if (luxSessionTimerService.showSessionTimer() && !mobileView) { @if (luxSessionTimerService.showSeconds()) {
<lux-button
  luxTagId="lux-session-timer-button"
  luxIconName="lux-interface-time-reset"
  luxLabel="{{ luxSessionTimerService.formattedSeconds() }} {{ 'luxc.app-header.session-timer.timer.button.lbl.seconds' | transloco }}"
  (luxClicked)="extendTimer()"
  [luxLoading]="luxLoading"
  luxTooltip="Laufzeit verlängern?"
></lux-button>
} @else {
<lux-button
  luxTagId="lux-session-timer-button"
  luxIconName="lux-interface-time-reset"
  luxLabel="{{ luxSessionTimerService.formattedMinutes() }} {{ 'luxc.app-header.session-timer.timer.button.lbl.minutes' | transloco }}"
  (luxClicked)="extendTimer()"
  [luxLoading]="luxLoading"
  luxTooltip="Laufzeit verlängern?"
></lux-button>
} }
