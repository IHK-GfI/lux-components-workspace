<example-base-structure
  exampleTitle="Session-Timer"
  exampleDocumentationHref="https://github.com/IHK-GfI/lux-components-workspace/wiki/lux%E2%80%90session%E2%80%90timer%E2%80%90v21"
>
  <example-base-simple-options class="lux-flex lux-flex-col lux-gap-4">
    Bei einer verbleibenden Session-Zeit von 2 minuten wird ein Dialog geöffnet, mit dem die Session verlängert oder beendet werden kann.
    Mit dem Button kann der Dialog manuell geöffnet werden.
    <lux-button luxLabel="Dialog öffnen" [luxFlat]="true" luxColor="primary" (luxClicked)="timerService.openDialog()"></lux-button>
    <div class="lux-flex lux-items-center lux-gap-2">
      <lux-toggle-ac
        luxLabel="Session darf verlängert werden"
        luxColor="primary"
        [luxChecked]="canExtendSession"
        (luxCheckedChange)="toggleCanExtendSession($event)"
      ></lux-toggle-ac>
      <app-status-marker [markerType]="markerTypeUpdated"></app-status-marker>
    </div>
    <div class="lux-mt-3"></div>
    <lux-input-ac luxLabel="Startzeit der Session in Sekunden" [(luxValue)]="startingSeconds"></lux-input-ac>
    <lux-button luxLabel="Zeit setzen" [luxFlat]="true" luxColor="primary" (luxClicked)="setTimer()"></lux-button>
  </example-base-simple-options>
</example-base-structure>
